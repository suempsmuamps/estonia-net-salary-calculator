<!doctype html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bruto & Neto palgakalkulaator</title>
  <style>
    :root {
      --bg: #f4f7ff;
      --card: #ffffff;
      --text: #17223b;
      --muted: #5f6b85;
      --line: #d8e0f5;
      --primary: #2f59ff;
      --primary-soft: #eef2ff;
      --ok: #169b62;
      --shadow: 0 12px 30px rgba(34, 62, 128, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 10% -10%, #dfe7ff 0%, transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, #e8f0ff 0%, transparent 60%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 960px;
      margin: 32px auto;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 22px 24px;
      background: linear-gradient(135deg, #f6f9ff 0%, #eef3ff 100%);
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.8vw, 2rem);
      line-height: 1.2;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: .95rem;
    }

    .content {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 16px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px;
      background: #fff;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .full { grid-column: 1 / -1; }

    label {
      display: block;
      font-size: .9rem;
      color: var(--muted);
    }

    input, select {
      width: 100%;
      margin-top: 6px;
      border: 1px solid #cfd8f2;
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: .95rem;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(47, 89, 255, .15);
    }

    .result {
      background: var(--primary-soft);
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px dashed #cbd8ff;
      font-size: .94rem;
    }

    .row:last-child { border-bottom: 0; }

    .row strong { font-variant-numeric: tabular-nums; }

    .neto {
      margin-top: 4px;
      background: #e7fff3;
      border: 1px solid #bcefd3;
      border-radius: 10px;
      padding: 10px;
    }

    .neto .big {
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--ok);
    }

    .note {
      margin-top: 10px;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.4;
    }

    @media (max-width: 860px) {
      .content { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .wrap { padding: 14px; margin: 18px auto; }
      .hero { padding: 18px; }
      .content { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <h1>Bruto & Neto palgakalkulaator</h1>
        <p class="subtitle">Eesti töötajale (kuu lõikes). Sisesta brutopalk ja vaata netosummat kohe.</p>
      </div>

      <div class="content">
        <section class="panel">
          <h2>Sisendid</h2>
          <div class="grid">
            <div>
              <label>Brutopalk (€ / kuu)
                <input id="gross" type="number" min="0" step="0.01" value="2000" />
              </label>
            </div>

            <div>
              <label>Tulumaks (%)
                <input id="incomeTaxRate" type="number" min="0" step="0.01" value="22" />
              </label>
            </div>

            <div>
              <label>Töötuskindlustus (töötaja, %)
                <input id="uiRate" type="number" min="0" step="0.01" value="1.6" />
              </label>
            </div>

            <div>
              <label>Kogumispension (II sammas)
                <select id="pensionRate">
                  <option value="0">0% (ei liitu)</option>
                  <option value="2" selected>2%</option>
                  <option value="4">4%</option>
                  <option value="6">6%</option>
                </select>
              </label>
            </div>

            <div>
              <label>Maksuvaba tulu
                <select id="taxFreeMode">
                  <option value="auto" selected>Automaatne (Eesti valem)</option>
                  <option value="manual">Sisestan käsitsi</option>
                </select>
              </label>
            </div>

            <div>
              <label>Käsitsi maksuvaba (€ / kuu)
                <input id="taxFreeManual" type="number" min="0" step="0.01" value="654" />
              </label>
            </div>

            <div class="full">
              <label>Sotsiaalmaks (tööandja, %)
                <input id="socialTaxRate" type="number" min="0" step="0.01" value="33" />
              </label>
            </div>
          </div>
        </section>

        <section class="panel result" id="result"></section>
      </div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => new Intl.NumberFormat('et-EE', { style: 'currency', currency: 'EUR' }).format(n);

    function monthlyTaxFreeAuto(gross) {
      if (gross <= 1200) return 654;
      if (gross >= 2100) return 0;
      const amount = 654 - (654 / 900) * (gross - 1200);
      return Math.max(0, amount);
    }

    function calculate() {
      const gross = Number($("gross").value) || 0;
      const incomeTaxRate = (Number($("incomeTaxRate").value) || 0) / 100;
      const uiRate = (Number($("uiRate").value) || 0) / 100;
      const pensionRate = (Number($("pensionRate").value) || 0) / 100;
      const socialTaxRate = (Number($("socialTaxRate").value) || 0) / 100;
      const taxFreeMode = $("taxFreeMode").value;
      const taxFreeManual = Number($("taxFreeManual").value) || 0;

      const unemployment = gross * uiRate;
      const pension = gross * pensionRate;
      const taxFree = taxFreeMode === "auto" ? monthlyTaxFreeAuto(gross) : Math.max(0, taxFreeManual);
      const taxableIncome = Math.max(0, gross - unemployment - pension - taxFree);
      const incomeTax = taxableIncome * incomeTaxRate;

      const totalEmployeeDeductions = unemployment + pension + incomeTax;
      const netSalary = gross - totalEmployeeDeductions;
      const employerSocialTax = gross * socialTaxRate;
      const totalEmployerCost = gross + employerSocialTax;

      $("result").innerHTML = `
        <div class="row"><span>Brutopalk</span><strong>${fmt(gross)}</strong></div>
        <div class="row"><span>Töötuskindlustus (töötaja)</span><strong>- ${fmt(unemployment)}</strong></div>
        <div class="row"><span>Kogumispension (II sammas)</span><strong>- ${fmt(pension)}</strong></div>
        <div class="row"><span>Maksuvaba tulu</span><strong>${fmt(taxFree)}</strong></div>
        <div class="row"><span>Tulumaks</span><strong>- ${fmt(incomeTax)}</strong></div>
        <div class="row"><span>Töötaja mahaarvamised kokku</span><strong>- ${fmt(totalEmployeeDeductions)}</strong></div>

        <div class="neto">
          <div class="row" style="border:0;padding:0;">
            <span><strong>Neto palk</strong></span>
            <span class="big">${fmt(netSalary)}</span>
          </div>
        </div>

        <div class="row" style="margin-top:8px;"><span>Sotsiaalmaks (tööandja)</span><strong>${fmt(employerSocialTax)}</strong></div>
        <div class="row"><span>Tööandja kogukulu</span><strong>${fmt(totalEmployerCost)}</strong></div>

        <p class="note">Märkus: kalkulaator annab hinnangulise tulemuse. Täpne arvestus võib erineda (soodustused, lisad, aasta ümberarvutus).</p>
      `;
    }

    ["gross", "incomeTaxRate", "uiRate", "pensionRate", "taxFreeMode", "taxFreeManual", "socialTaxRate"]
      .forEach(id => $(id).addEventListener("input", calculate));

    calculate();
  </script>
</body>
</html>
